<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Tracker</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>🔗 Lead Tracker</h1>
            <p>Save websites in one click</p>
        </div>

        <div class="input-box">
            <input type="text" id="input-el" placeholder="Paste website URL...">
        </div>

        <div class="buttons">

            <button id="input-btn">
                Save Link
            </button>

            <button id="tab-btn">
                Save Tab
            </button>

        </div>

        <button id="delete-btn">
            Delete All
        </button>

        <ul id="ul-el"></ul>

    </div>

    <script src="index.js"></script>

</body>

</html>
